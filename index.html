<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Visualizer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <h1><span>💰</span> Budget Visualizer</h1>

  <!-- Balance Summary -->
  <div class="card">
    <div class="card-title">Overview</div>
    <div class="balance-grid">
      <div class="balance-item net">
        <div class="label">Balance</div>
        <div class="amount" id="balance">$0.00</div>
      </div>
      <div class="balance-item income">
        <div class="label">Income</div>
        <div class="amount" id="total-income">$0.00</div>
      </div>
      <div class="balance-item expense">
        <div class="label">Expenses</div>
        <div class="amount" id="total-expense">$0.00</div>
      </div>
    </div>
  </div>

  <!-- Add Transaction -->
  <div class="card">
    <div class="card-title">Add Transaction</div>

    <div class="form-row">
      <div>
        <label for="desc">Description</label>
        <input id="desc" type="text" placeholder="e.g. Groceries" maxlength="40" />
      </div>
      <div>
        <label for="amount">Amount ($)</label>
        <input id="amount" type="number" placeholder="0.00" min="0.01" step="0.01" />
      </div>
    </div>

    <div class="form-row">
      <div>
        <label for="category">Category</label>
        <select id="category">
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Housing">🏠 Housing</option>
          <option value="Health">💊 Health</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Utilities">💡 Utilities</option>
          <option value="Salary">💼 Salary</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div>
        <label>Type</label>
        <div class="type-toggle">
          <div class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">− Expense</div>
          <div class="type-btn" id="btn-income" onclick="setType('income')">+ Income</div>
        </div>
      </div>
    </div>

    <button class="btn-add" onclick="addTransaction()">Add Transaction</button>
  </div>

  <!-- Spending Chart -->
  <div class="card">
    <div class="card-title">Spending by Category</div>
    <div id="chart-area">
      <p class="chart-empty" id="chart-empty">No expense data yet.</p>
      <div class="pie-wrap" id="pie-wrap" style="display:none">
        <canvas id="pie-chart"></canvas>
      </div>
      <ul class="pie-legend" id="pie-legend"></ul>
    </div>
  </div>

  <!-- Transaction History -->
  <div class="card">
    <div class="section-header">
      <div class="card-title" style="margin-bottom:0">History</div>
      <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>

    <div class="tx-filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('expense',this)">Expenses</button>
      <button class="filter-btn" onclick="setFilter('income',this)">Income</button>
    </div>

    <div class="tx-list" id="tx-list"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
